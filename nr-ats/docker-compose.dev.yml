version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ${PROJECT_NAME:-app}-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-app_db}
    ports:
      - '${DATABASE_PORT:-5432}:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-app}-redis-dev
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # api Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-development
    container_name: ${PROJECT_NAME:-app}-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@postgres:5432/${DATABASE_NAME:-app_db}
      REDIS_URL: redis://redis:6379
    volumes:
      - ./apps/backend/api:/app/apps/backend/api
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/backend/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '${API_PORT:-4000}:3000'
    networks:
      - app-network

  # web Frontend
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-production
    container_name: ${PROJECT_NAME:-app}-web
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    volumes:
      - ./apps/frontend/web:/app/apps/frontend/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/frontend/web/node_modules
      - /app/apps/frontend/web/.next
    ports:
      - '${WEB_PORT:-3000}:3000'
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_dev_data:
    name: ${PROJECT_NAME:-app}-postgres-dev-data
  redis_dev_data:
    name: ${PROJECT_NAME:-app}-redis-dev-data
